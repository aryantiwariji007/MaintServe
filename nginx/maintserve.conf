upstream maintserve_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Increase timeouts for LLM requests
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    # Increase max body size for images
    client_max_body_size 50M;

    location / {
        proxy_pass http://maintserve_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffering settings for streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check endpoint (no auth required via nginx)
    location /health {
        proxy_pass http://maintserve_api/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
