global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # MaintServe API metrics
  - job_name: 'maintserve'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  # vLLM metrics (if exposed)
  - job_name: 'vllm'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
